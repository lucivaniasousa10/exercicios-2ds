<!DOCTYPE html>
<html lang="pt-br">
    
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Academy</title>
</head>
<body>
    <h1>Sistema de Cadastro de Alunos</h1>
    <h2>Cadastro</h2>
    <form>
        <label>Nome</label>
        <input type="text">

        <label>Email</label>
        <input type="email">

        <label>Idade</label>
        <input type="number">

        <label>Curso com opções</label>
        <select>
            <option>HTLM</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>

        <textarea></textarea>   
        <input type="submit" value="Cadastrar">
        <hr>

        <h2>Alunos Matriculados</h2>

        <table>
            <caption>Lista de Alunos</caption>

            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Curso</th>
            </tr>

            <tr>
                <td>Ana</td>
                <td>ana@email.com</td>
                <td>HTML</td>
            </tr>

            <tr>
                <td>Bruno</td>
                <td>bruno@email.com</td>
                <td>CSS</td>
            </tr>

            <tr>
                <td>Carla</td>
                <td>carla@email.com</td>
                <td>JavaScript</td>
            </tr>
        </table>
    </form>
</body>
</html>
